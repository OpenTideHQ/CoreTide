# HarfangLab MDR Configuration Sub-Schema
# Supports both Sigma rules (behavioral detection) and YARA rules (memory/file scanning)
# A rule must be either Sigma OR YARA, not both
#
# Key Design: Fields are conditional based on the logsource hierarchy:
# product (windows/linux/macos) → category (event type) → available fields

required:
  - status
  - schema

# Ensure that either sigma or yara is present, but not both
oneOf:
  - required: [sigma]
    not:
      required: [yara]
  - required: [yara]
    not:
      required: [sigma]

properties:
  schema:
    title: Schema identifier and version
    type: string
    description: Identifier of the schema at its current version 
    default: harfanglab::1.0
    pattern: ^harfanglab::[1-9].[0-9]$

  status: 
    title: Status of the use-case
    type: string
    description: Define the status according to use case development life cycle process
    tide.config.statuses: True

  contributors:
    title: Development Contributors
    type: array
    description: Individuals who supported creating, enriching or tuning the detection. 
    items:
      type: string
      format: email

  tenants: 
    title: Target Tenants
    icon: 🏢
    description: |
      Override the default organizations and deploy to selected tenants only.
    type: array
    tide.config.system.tenants: harfanglab

  flags:
    title: Flags
    icon: 🚩
    description: Flags allow to customize the rule behaviour using the modifiers framework
    type: array
    tide.config.parameter-list: systems.harfanglab.platform.flags

  # Common HarfangLab rule metadata
  maturity:
    title: Rule Maturity
    description: |
      Indicates the maturity level of the rule. Maps to HarfangLab's hl_status field.
    type: string
    enum:
      - Stable
      - Testing
      - Experimental
    enumMarkdown:
      - Rule has been validated and is production-ready
      - Rule is being tested and may produce false positives
      - Rule is experimental and should be used with caution

  confidence:
    title: Rule Confidence
    description: |
      Confidence level of the detection. Maps to HarfangLab's rule_confidence_override field.
    type: string
    enum:
      - Weak
      - Moderate
      - Strong
    enumMarkdown:
      - Low confidence - may produce many false positives
      - Medium confidence - some false positives expected
      - High confidence - minimal false positives expected

  action:
    title: Rule Action
    description: |
      The action to take when the rule triggers. Maps to HarfangLab's global_state field.
    type: string
    enum:
      - Alert
      - Alert & Block
      - Alert, Block & Quarantine
    enumMarkdown:
      - Generate an alert only
      - Generate an alert and block the threat
      - Generate an alert, block, and quarantine the affected system

  #############################################################################
  # SIGMA RULE SECTION
  #############################################################################
  sigma:
    title: Sigma Rule Configuration
    description: |
      Configuration for Sigma behavioral detection rules. HarfangLab's Sigma engine
      provides detection based on log sources and event patterns.
    type: object
    required:
      - logsource
      - selections
      - condition
    
    properties:
      action:
        title: Sigma-specific Action Override
        description: Override the top-level action for this Sigma rule specifically
        type: string
        enum:
          - Alert
          - Alert & Block
          - Alert, Block & Quarantine

      confidence:
        title: Sigma-specific Confidence Override
        description: Override the top-level confidence for this Sigma rule specifically
        type: string
        enum:
          - Weak
          - Moderate
          - Strong

      tags:
        title: Sigma Tags
        description: |
          Tags associated with the rule, including MITRE ATT&CK tactics (e.g., attack.credential_access)
          and techniques (e.g., attack.t1557)
        type: array
        items:
          type: string
          pattern: ^(attack\.[a-z_]+|attack\.t[0-9]{4}(\.[0-9]{3})?|cve\.[0-9]{4}\.[0-9]+|[a-z_\.]+)$

      logsource:
        title: Log Source
        description: |
          Defines the product and category of logs this rule applies to.
          Product determines which categories are available, and category determines which fields are available.
        type: object
        required:
          - product
          - category
        
        # Conditional schema: product selection determines available categories
        allOf:
          # Windows product with its categories
          - if:
              properties:
                product:
                  const: windows
            then:
              properties:
                category:
                  enum:
                    - process_creation
                    - network_connection
                    - network_dpi
                    - network_close
                    - driver_load
                    - library_event
                    - remote_thread
                    - injected_thread
                    - raw_device_access
                    - process_access
                    - pipe_created
                    - pipe_connected
                    - file_event
                    - registry_event
                    - process_termination
                    - process_tampering
                    - wmi_event
                    - dns_query
                    - eventlog
                    - win32k_getasynckeystate
                    - win32k_registerrawinputdevices
                    - win32k_setwindowshookex
                  enumMarkdown:
                    - "**process_creation** - Event triggered when a process is created"
                    - "**network_connection** - Event triggered when a network connection is created"
                    - "**network_dpi** - Event triggered when network connection protocols are identified (HTTP/TLS/SSH)"
                    - "**network_close** - Event triggered when a network connection is closed"
                    - "**driver_load** - Event triggered when a driver is loaded by the system"
                    - "**library_event** - Event triggered when a native or managed (.NET) library is loaded"
                    - "**remote_thread** - Event triggered when a remote thread is created"
                    - "**injected_thread** - Event triggered when an injected thread is created"
                    - "**raw_device_access** - Event triggered when a process makes raw device access"
                    - "**process_access** - Event triggered when a process is accessed"
                    - "**pipe_created** - Event triggered when a named pipe is created"
                    - "**pipe_connected** - Event triggered when a named pipe is connected"
                    - "**file_event** - Event triggered on file operations"
                    - "**registry_event** - Event triggered on registry operations"
                    - "**process_termination** - Event triggered when a process terminates"
                    - "**process_tampering** - Event triggered on process tampering"
                    - "**wmi_event** - Event triggered on WMI operations"
                    - "**dns_query** - Event triggered on DNS queries"
                    - "**eventlog** - Generic Windows event log access"
                    - "**win32k_getasynckeystate** - Triggered when GetAsyncKeyState API is used (keylogger detection)"
                    - "**win32k_registerrawinputdevices** - Triggered when RegisterRawInputDevices API is used"
                    - "**win32k_setwindowshookex** - Triggered when SetWindowsHookEx API is used"

          # Linux product with its categories
          - if:
              properties:
                product:
                  const: linux
            then:
              properties:
                category:
                  enum:
                    - process_creation
                    - process_ptrace
                    - bpf_event
                    - library_event
                    - filesystem_event
                    - network_connection
                    - network_listen
                    - network_rawsocket
                    - login_event
                    - logout_event
                    - url_request
                    - dns_query
                  enumMarkdown:
                    - "**process_creation** - Event triggered when a new process is executed (execve)"
                    - "**process_ptrace** - Event triggered when a process uses ptrace"
                    - "**bpf_event** - Event triggered when BPF programs are loaded/attached"
                    - "**library_event** - Event triggered when a shared library (.so) is loaded"
                    - "**filesystem_event** - Event triggered on filesystem operations (read/write/remove/rename/chmod/chown)"
                    - "**network_connection** - Event triggered when a network connection is created"
                    - "**network_listen** - Event triggered when a listen system call is executed"
                    - "**network_rawsocket** - Event triggered when a raw socket is created"
                    - "**login_event** - Event triggered when a user authenticates (PAM)"
                    - "**logout_event** - Event triggered when a user disconnects"
                    - "**url_request** - Event triggered when a process requests a URL"
                    - "**dns_query** - Event triggered when a domain name is resolved"

          # macOS product with its categories
          - if:
              properties:
                product:
                  const: macos
            then:
              properties:
                category:
                  enum:
                    - process_creation
                    - library_event
                    - filesystem_event
                    - network_connection
                    - login_event
                    - logout_event
                  enumMarkdown:
                    - "**process_creation** - Event triggered when a new process is executed (execve)"
                    - "**library_event** - Event triggered when a Dylib is loaded"
                    - "**filesystem_event** - Event triggered on filesystem operations"
                    - "**network_connection** - Event triggered when a network connection is created"
                    - "**login_event** - Event triggered when a user logs in"
                    - "**logout_event** - Event triggered when a user logs out"

        properties:
          product:
            title: Product
            description: |
              The operating system/product generating the logs. 
              This selection determines which categories are available.
            type: string
            enum:
              - windows
              - linux
              - macos
            enumMarkdown:
              - "**windows** - Microsoft Windows operating system"
              - "**linux** - Linux operating system"
              - "**macos** - Apple macOS operating system"

          category:
            title: Category
            description: |
              The event category. Available categories depend on the selected product.
            type: string

      selections:
        title: Detection Selections
        description: |
          List of field selections for the detection rule. Each selection defines
          a set of field conditions that can be combined using the condition expression.
          
          Available fields depend on the logsource product and category selected.
        type: array
        minItems: 1
        items:
          type: object
          required:
            - name
            - field
            - value
          properties:
            name:
              title: Selection Name
              description: |
                A unique name for this selection, used in the condition expression.
                Use descriptive names like 'FileDetection', 'Exclusions', 'ProcessMatch'.
              type: string
              pattern: ^[A-Za-z][A-Za-z0-9_]*$

            field:
              title: Field Name
              description: |
                The field to match against. Available fields depend on the logsource category.
                
                **Windows process_creation fields:**
                CommandLine, Company, CurrentDirectory, Description, GrandparentImage, 
                GrandparentCommandLine, GrandparentIntegrityLevel, Image, ImageDriveType, 
                Imphash, IntegrityLevel, InternalName, FileVersion, LegalCopyright, LogonId, 
                md5, OriginalFileName, ParentImage, ParentCommandLine, ParentIntegrityLevel, 
                Product, ProductVersion, sha1, sha256, User, UserSID, Signed, Signature, 
                SignatureStatus, Ancestors, StackTrace, MinimalStackTrace, LnkLinked, LnkPath, 
                LnkDriveType, IsFileObjectTransacted, AuthentihashSha1, AuthentihashSha256
                
                **Windows network_connection fields:**
                DestinationPort, DestinationIp, DestinationNames, DestinationHostname, 
                DestinationIsIpv6, Image, Initiated, Protocol, ProtocolNumber, SourcePort, 
                SourceIp, SourceIsIpv6, User, ConnectionGuid
                
                **Windows driver_load fields:**
                ImageLoaded, Signed, Signature, SignatureStatus, DriverMd5, DriverSha1, 
                DriverSha256, Company, Description, FileVersion, InternalName, LegalCopyright, 
                OriginalFileName, Product, ProductVersion, AuthentihashSha1, AuthentihashSha256
                
                **Windows library_event fields:**
                Company, Description, FileVersion, InternalName, Image, ImageLoaded, 
                ImageLoadedDriveType, LegalCopyright, OriginalFileName, Product, ProductVersion, 
                Signed, Signature, SignatureStatus, StackTrace, MinimalStackTrace, AppDomainID, 
                AssemblyFlags, AssemblyName, AssemblyVersion, LibraryType, AuthentihashSha1, 
                AuthentihashSha256
                
                **Windows remote_thread fields:**
                NewThreadId, SourceProcessId, SourceImage, StartAddress, StartModule, 
                StartFunction, TargetProcessId, StackTrace, MinimalStackTrace
                
                **Windows process_access fields:**
                CallTrace, StackTrace, MinimalStackTrace, GrantedAccess, GrantedAccessStr, 
                SourceImage, TargetImage, TargetProcessCommandLine, TargetProcessImage
                
                **Windows file_event fields:**
                Kind, Path, TargetPath, FileName, Hashes, User
                
                **Windows registry_event fields:**
                Kind, TargetObject, Details, NewName
                
                **Linux process_creation fields:**
                Image, CommandLine, CurrentDirectory, md5, sha1, sha256, User, RealUsername, 
                EffectiveUsername, SavedUsername, RealGroup, EffectiveGroup, SavedGroup, 
                ParentImage, ParentCommandLine, GrandparentImage, GrandparentCommandLine, 
                Ancestors, MemfdName
                
                **Linux filesystem_event fields:**
                Kind (read/write/remove/rename/chmod/chown/symlink/hardlink/written_executable), 
                Path, TargetPath, Mode, PrettyMode, OldMode, PrettyOldMode, Uid, Gid, 
                FileMd5, FileSha1, FileSha256, FileSize
                
                **Linux network_connection fields:**
                DestinationIp, DestinationNames, DestinationHostname, DestinationIsIpv6, 
                DestinationPort, Protocol, ProtocolNumber, Initiated, SourceIp, SourceIsIpv6, 
                SourcePort
                
                **macOS process_creation fields:**
                Image, CommandLine, CurrentDirectory, User, ParentImage, ParentCommandLine, 
                GrandparentImage, GrandparentCommandLine, md5, sha1, sha256, Ancestors, 
                RealUsername, EffectiveUsername, RealGroup, EffectiveGroup, CdHash, Signed, 
                SignatureTeamId, SignatureSigningId, CodesigningFlags, CodesigningFlagsStr, 
                IsPlatformBinary
                
                **Extra process fields (available on all events except driver_load):**
                ProcessCommandLine, ProcessCompany, ProcessCurrentDirectory, ProcessDescription, 
                ProcessImage, ProcessImphash, ProcessIntegrityLevel, ProcessMd5, ProcessSha1, 
                ProcessSha256, ProcessUser, ProcessAncestors, ProcessStackTrace
                
                **Agent fields (available on all events):**
                AgentId, AgentVersion, AgentOsType, AgentHostname, AgentDomain, AgentIpAddress
              type: string

            modifiers:
              title: Value Modifiers
              description: |
                Modifiers to apply to the field matching. Multiple modifiers can be chained.
              type: array
              items:
                type: string
                enum:
                  - all
                  - base64
                  - base64offset
                  - cased
                  - cidr
                  - contains
                  - endswith
                  - exists
                  - expand
                  - fieldref
                  - gt
                  - gte
                  - lt
                  - lte
                  - re
                  - startswith
                  - utf16
                  - utf16le
                  - utf16be
                  - wide
                  - windash
                enumMarkdown:
                  - "**all** - All values must match (AND instead of OR)"
                  - "**base64** - Base64 encode the value before matching"
                  - "**base64offset** - Base64 encode with all 3 offset variants"
                  - "**cased** - Case-sensitive matching (default is case-insensitive)"
                  - "**cidr** - Match IP addresses using CIDR notation (e.g., 192.168.0.0/16)"
                  - "**contains** - Value contains the specified substring"
                  - "**endswith** - Value ends with the specified string"
                  - "**exists** - Check if field exists (use true/false as value)"
                  - "**expand** - Expand placeholder values from pipelines"
                  - "**fieldref** - Reference another field's value"
                  - "**gt** - Greater than (for numeric comparisons)"
                  - "**gte** - Greater than or equal to (for numeric comparisons)"
                  - "**lt** - Less than (for numeric comparisons)"
                  - "**lte** - Less than or equal to (for numeric comparisons)"
                  - "**re** - Regular expression match"
                  - "**startswith** - Value starts with the specified string"
                  - "**utf16** - UTF-16 encoding (use with base64 modifiers)"
                  - "**utf16le** - UTF-16 Little Endian encoding"
                  - "**utf16be** - UTF-16 Big Endian encoding"
                  - "**wide** - Wide string encoding, alias for utf16le"
                  - "**windash** - Windows dash variants (-, /, –, —, ―)"

            value:
              title: Match Values
              description: |
                Values to match against the field. Can be a single value or list of values.
                Multiple values are OR'd together unless the 'all' modifier is used.
              oneOf:
                - type: string
                - type: array
                  items:
                    type: string
                - type: boolean
                - type: integer
                - type: number

      condition:
        title: Detection Condition
        description: |
          Boolean expression combining selections. Supports AND, OR, NOT operators
          and parentheses for grouping. Use selection names defined in the selections array.
          
          Examples:
          - `FileDetection and not Exclusions`
          - `(ProcessMatch or CommandLineMatch) and not Filter`
          - `selection`
          - `1 of selection*`
        type: string
        pattern: ^[A-Za-z0-9_\s\(\)\*\|]+(\s*(and|or|not|AND|OR|NOT|of)\s*[A-Za-z0-9_\s\(\)\*\|]*)*$

      false_positives:
        title: Known False Positives
        description: List of known situations that may trigger false positives
        type: array
        items:
          type: string

  #############################################################################
  # YARA RULE SECTION
  #############################################################################
  yara:
    title: YARA Rule Configuration
    description: |
      Configuration for YARA rules for memory and file scanning.
      YARA rules provide pattern-based detection for malware and threat hunting.
      
      YARA rules can target specific operating systems and scan contexts.
    type: object
    required:
      - strings
      - condition
    properties:
      meta:
        title: YARA Meta Information
        description: Metadata for the YARA rule
        type: object
        properties:
          context:
            title: Scan Context
            description: |
              The context in which the YARA rule should be applied.
              Determines what type of memory/data the rule scans.
            type: string
            enum:
              - process
              - thread
              - memory
            enumMarkdown:
              - "**process** - Scan process memory and associated files"
              - "**thread** - Scan thread context and associated memory"
              - "**memory** - Scan raw memory regions"

          os:
            title: Target Operating System
            description: |
              The operating system this YARA rule targets.
              Leave empty to apply to all platforms.
            type: string
            enum:
              - Windows
              - MacOS
              - Linux
            enumMarkdown:
              - "**Windows** - Microsoft Windows systems"
              - "**MacOS** - Apple macOS systems"
              - "**Linux** - Linux systems"

      strings:
        title: YARA Strings
        description: |
          Raw YARA strings definition block. Define the patterns to match:
          
          **Text strings:**
          ```
          $str1 = "malware" ascii
          $str2 = "suspicious" wide nocase
          ```
          
          **Hex patterns:**
          ```
          $hex1 = { 4D 5A 90 00 }
          $hex2 = { E8 ?? ?? ?? ?? }
          ```
          
          **Regular expressions:**
          ```
          $re1 = /[a-z]{5,10}/i
          $re2 = /https?:\/\/[^\s]+/
          ```
          
          **String modifiers:** ascii, wide, nocase, fullword, private, base64, xor
        type: string
        tide.template.multiline: True

      condition:
        title: YARA Condition
        description: |
          Raw YARA condition expression. Defines how the strings should match.
          
          **Examples:**
          ```
          all of them
          any of ($str*)
          $str1 and $str2
          uint16(0) == 0x5A4D and $str1
          #str1 > 5
          filesize < 100KB and $hex1
          ```
          
          **Available functions:** uint8, uint16, uint32, int8, int16, int32, filesize, 
          entrypoint, at, in, for, of, them, any, all, none
        type: string
        tide.template.multiline: True
