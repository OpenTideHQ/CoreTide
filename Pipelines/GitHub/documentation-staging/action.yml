name: Documentation Generation
description: Generates Wiki during MDR changes in PRs
inputs:
  coretide_path:
    description: "Path where coretide has been cloned"
  wiki_repo_name:
    description: "Name of the Wiki repository to push to"
  wiki_repo_branch:
    description: "Repo Branch of the Wiki repository to push to"

runs:
  using: "composite"
  steps:
    - name: Move Wiki to CoreTide
      id: move_wiki
      shell: bash
      run: |
        echo "::notice::Moving wiki repo into CoreTide path"
        mv ${{ inputs.wiki_repo_name }} ./${{inputs.coretide_path}}
    - name: Extract Staging Index from Wiki for Reconcilitation
      id: reconciliate_staging_index
      shell: bash
      run: |
        echo "::group::Extract Staging Index"
        cd ${{inputs.coretide_path}}
        if [ -e ${{ inputs.wiki_repo_name }}/staging_index.json ]; then
          echo "::notice::Staging index found — copying for reconciliation"
          cp ${{ inputs.wiki_repo_name }}/staging_index.json ./
        else
          echo "::warning::No staging index found — skipping reconciliation"
        fi
        echo "::endgroup::"
    - name: Generate Tide Index
      id: generate_index
      shell: bash
      run: |
        echo "::group::Generate Staging Index"
        cd ${{inputs.coretide_path}}/Engines/indexing/
        python ./staging_indexer.py
        echo "::endgroup::"
        echo "::notice::Staging index generated"
    - name: Copy Index to Wiki
      id: copy_index
      shell: bash
      run: |
        echo "::notice::Copying staging index to wiki repository"
        cd ${{inputs.coretide_path}}
        cp staging_index.json ./${{ inputs.wiki_repo_name }}/
    - name: Documentation Toolchain
      id: documentation_toolchain
      shell: bash
      run: |
        echo "::group::Documentation Toolchain (Staging)"
        cd ${{inputs.coretide_path}}/Orchestration
        python document.py
        echo "::endgroup::"
        echo "::notice::Staging documentation generation completed"
    - name: Copy Documentation in Wiki 
      id: copy_documentation
      shell: bash
      run: |
        echo "::notice::Copying documentation to wiki repository"
        cd ${{inputs.coretide_path}}
        cp -fr wiki/. ./${{ inputs.wiki_repo_name }}/
    - name: Move Back Wiki Repo to resources
      id: move_back_wiki
      shell: bash
      run: |
        echo "::notice::Moving wiki repo back to resources"
        mv ${{inputs.coretide_path}}/${{ inputs.wiki_repo_name }} ./${{ inputs.wiki_repo_name }}/
    - name: Commit documentation
      id: commit_documentation
      shell: bash
      run: |
        echo "::group::Commit Staging Documentation"
        cd ${{ inputs.wiki_repo_name }}
        [[ $(git status --porcelain) ]] || { echo "::warning::No documentation changes to commit — skipping"; echo "::endgroup::"; exit 0; }
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        echo "::notice::Staging documentation changes detected — committing"
        git pull origin ${{ inputs.wiki_repo_branch }}
        git add -A
        git commit -m "CoreTide Staging Documentation Automation [skip ci]"
        git push origin HEAD:${{ inputs.wiki_repo_branch }}
        echo "::endgroup::"
        echo "::notice::Staging documentation committed and pushed"