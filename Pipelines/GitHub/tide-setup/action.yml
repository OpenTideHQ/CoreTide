name: Setup Tide Environment
description: |
  This action sets up the Tide environment by checking out the CoreTide repository,
  installing dependencies, and running the framework setup script.

inputs:
  python_version:
    description: "python version to use"
  requirements_file:
    description: "requirements.txt file path"
  opentide_secrets:
    description: "Content of the OpenTide secrets file, formatted as key=value pairs separated by semicolons"
    required: true
  coretide_path:
    description: "Path where CoreTide needs to be cloned into"
    required: false
    default: coretide
  coretide_ref:
    description: "Ref to clone CoreTide from"
    required: false
    default: development

runs:
  using: "composite"
  steps:

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 100

    - name: Checkout Tide Core
      uses: actions/checkout@v4
      with:
        repository: OpenTideHQ/CoreTide
        path: ${{ inputs.coretide_path }}
        ref: refs/heads/${{ inputs.coretide_ref }}

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install requirements
      shell: bash
      run: |
        pip install -r ${{ inputs.requirements_file }}

    - name: Configure Git
      shell: bash
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"

    - name: Restore env vars from string
      shell: bash
      run: |
        decoded_secrets=$(echo $opentide_secrets | xxd -ps -r)
        IFS=';' read -ra KV <<< $decoded_secrets
        for pair in "${KV[@]}"; do
          if [[ -n "$pair" ]]; then
            echo "$pair" >> $GITHUB_ENV
          fi
        done
      env:
        opentide_secrets: ${{ inputs.opentide_secrets }}
