                    properties:
                      field:
                        enum:
                          - Key
                          - Value
                          - CreatedBy.Name
                          - CreatedBy.Path
                          - CreatedBy.FullPathName
                          - CreatedBy.CommandLine
                          - Operation
                        markdownEnumDescriptions:
                          - Key
                          - Value
                          - Creation Process Name
                          - Creation Process Path
                          - Creation Process Full Path Name
                          - Creation Process Command Line
                          - Operation
                    
                    # Registry Operation field constraint for exclusions
                    allOf:
                      - if:
                          properties:
                            field:
                              const: Operation
                        then:
                          properties:
                            value:
                              oneOf:
                                - type: string
                                  enum:
                                    - Key Created
                                    - Key Deleted
                                    - Key Renamed
                                    - Value Created
                                    - Value Deleted
                                    - Value Written
                                - type: array
                                  items:
