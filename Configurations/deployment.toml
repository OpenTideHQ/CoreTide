default_responders = ""

# New-style statuses mapped from Framework Vocabulary `MDR Status`
[[statuses]]
name = "DESIGN"
description = "Under active functional design, without technical translation yet"
strategy = "INERT"

[[statuses]]
name = "DEVELOPMENT"
description = "Under active technical implementation, going in exploratory rounds"
strategy = "PREVIEW"

[[statuses]]
name = "IMPROVING"
description = "Rule is qualified functionally, but is undergoing refinement rounds"
strategy = "PREVIEW"

[[statuses]]
name = "STAGING"
description = "Deployed in staging environment for operational testing"
strategy = "PREVIEW"

[[statuses]]
name = "PRODUCTION"
description = "Deployed in active production environment, potentially raising alerts"
strategy = "RELEASE"

[[statuses]]
name = "ACCEPTANCE"
description = '''A MDR is ready to go for PRODUCTION for CSIRC team. During ACCEPTANCE a CSIRC
analyst will handle the alert and will ensure the CSOC ticket and playbook are correct.'''
strategy = "STAGING"

[[statuses]]
name = "DISABLED"
description = "Rule is still accessible, but not active in any environment"
strategy = "DISABLEMENT"

[[statuses]]
name = "REMOVED"
description = "Rule is fully deprecated, and only flagged under this status for archival purposes"
strategy = "DELETION"

[promotion]
enabled = true
promotion_target = "PRODUCTION"

[proxy]
proxy_user = "$PROXY_USER"
proxy_password = "$PROXY_PASSWORD"
proxy_host = "$PROXY_HOST"
proxy_port = "$PROXY_PORT"

# If enabled, updates a lookup continuously with MDR Data. Often useful to
# have access to MDR Data directly on external systems, e.g. for alert enriching
[metadata_lookup]
enabled = false
#name = ""
#systems = ["splunk"]

[debug]
mdr_test_uuids = [""] #UUID of MDRs that can be used for Debugging purposes
lookup_test_files = [""] #File name of MDRs that can be used for Debugging purposes
metadata_lookup_test_file = [""]
proxy_enabled = false #Global flag to enable or disable proxy configuration when running in debug mode
ssl_enabled = true #Global flag to enable or disable proxy configuration when running in debug mode