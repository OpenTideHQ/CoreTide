name: Framework Generation
description: Generates Schemas, Indexes and Templates

inputs:
  coretide_path:
    description: "Path where coretide has been cloned"

runs:
  using: "composite"
  steps:
    - name: Run OpenTide Framework Setup
      shell: bash
      run: |
        echo "::group::Framework Generation"
        echo "::notice::Starting OpenTide framework generation"
        cd coretide/Orchestration
        python generate.py
        echo "::endgroup::"
        echo "::notice::Framework generation completed"

    - name: Check for Changes and Commit
      id: check_changes
      shell: bash
      env:
        CORETIDE_PATH: ${{ inputs.coretide_path }}
      run: |
        echo "::group::Check for Changes and Commit"
        echo "::notice::Checking for framework changes to commit"

        changes=$(git status --porcelain -- . ':!$CORETIDE_PATH' ':!coretide')
        echo "$changes"

        if [[ -z "$changes" ]]; then
          echo "::warning::No changes detected — skipping commit"
          echo "::endgroup::"
          exit 0
        fi

        REPO_NAME=$(basename "$(git rev-parse --show-toplevel)")
        echo "::debug::REPO_NAME: $REPO_NAME"

        filtered_changes=$(echo "$changes" | grep -vE '(M|A|D) $REPO_NAME/|(M|A|D) $CORETIDE_PATH/')
        echo "::debug::Filtered changes: $filtered_changes"
        if [[ -z "$filtered_changes" ]]; then
          echo "::warning::Changes only in Local Instance or CoreTide directories — not committing"
          echo "::endgroup::"
          exit 0
        fi

        echo "::notice::Committing framework changes"
        git add -- . ':!${REPO_NAME}' ':!CoreTide' ':!coretide' ':!$CORETIDE_PATH'
        git commit -m "CoreTide Framework Automation [skip ci]"

        echo "::notice::Syncing remote trunk and rebasing"
        git fetch origin ${{ github.ref_name }}
        git rebase origin/${{ github.ref_name }}

        echo "::notice::Pushing changes"
        git push origin HEAD:${{ github.ref_name }}
        echo "::endgroup::"
