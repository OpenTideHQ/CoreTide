title: TVM Schema validator
description: CoreTIDE Data Model Specification for  Threat Vector Models

filename: TVM1234 - Model Name.yaml
modeldoc: A Threat Vector Model is ...

$schema: http://json-schema.org/draft-07/schema#
additionalProperties: false

tide.placeholders:
  SCHEMA_VERSION: tvm::2.1

required:
  - name
  - criticality
  - threat 
  - metadata

properties:

  name: 
    title: Model Name
    type: string
    description: Name of the detection model
    example: Placeholder

  criticality: 
    title: Vector criticality
    type: string
    tide.vocab: true
    description: Objective calculation from severity, impact and sophistication
    example: Emergency

  references:
    tide.meta.definition: true

  metadata:
    tide.template.spacer: true
    tide.meta.definition: true

  threat:
    title: Threat
    type: object
    description: Technical details regarding the threat vector
    required:
      - att&ck
      - terrain
      - surface
      - severity
      - leverage
      - impact
      - viability
      - description
    
    properties:

      actors:
        tide.meta.definition: actors

      killchain: 
        title: Cyber Kill Chain
        type:
          - string
          - array
        tide.vocab: true
        description: Where the vector is positionned in the kill chain of adversarial operations
        markdownDescription:
          Where the vector is positionned in the kill chain of adversarial operations

          💡 You can also describe **multiple** killchain phases applicable using a list
        example: Lateral Movement

      att&ck: 
        title: ATT&CK Techniques
        type: array
        tide.vocab: true
        tide.vocab.hints.no-wrap: true 
        description: T-ID of the techniques related to the Vector
        example: T1098
        items: 
          type: string
          pattern: 'T\d{4}'

      chaining:
        tide.meta.definition: true

      cve: 
        title: Common Vulnerability Enumeration
        type: array
        description: CVEs related to the TVM
        example: CVE-2020-7491
        items: 
          type: string
          pattern: '^(CVE-(1999|2\d{3})-(0\d{2}[0-9]|[1-9]\d{3,}))$'

      misp: 
        title: Related MISP Events
        type: array
        description: List of MISP event UUID(s) that are related to this threat vector  
        markdownDescription: List of MISP **event** UUID(s) that are related to this threat vector 
        example: 74c11cb4-b903-4541-aaa2-1db925902fb9
        items: 
          type: string
          pattern: '^[a-fA-F\d]{8}(?:\-[a-fA-F\d]{4}){3}\-[a-fA-F\d]{12}$'


      surface:
        title: Threat Surface
        type: array
        tide.vocab: true
        tide.vocab.scoped: true
        description: Hierarchical scoping of technologies and environments applicable to the threat vector, using category::target notation
        markdownDescription: |
          Hierarchical scoping of technologies and environments applicable to the threat vector.

          Uses scoped `category::target` notation. Available categories: `os`, `application`, `authentication`, `cloud`, `infrastructure`, `security`, `iot`, `protocol`.
        example: os::Windows

      domains:
        title: Domains [DEPRECATED]
        type: array
        tide.vocab: true
        description: "[DEPRECATED - use surface] High-level technology domain concerned by the model"
        example: Public Cloud

      terrain:
        title: Technical terrain
        type: string
        tide.template.multiline : True
        description: Precisions on what combination of software, infrastructure or configurations need to present before the threat is realized. 
        example: Adversary must have administrative priviledges over domain controller.

      targets: 
        title: Targets [DEPRECATED]
        type: array
        tide.vocab: true
        description: "[DEPRECATED - use surface] Category of devices or services where the attack is executed on, or upon"
        example: Microservices

      platforms: 
        title: Platforms concerned [DEPRECATED]
        type: array
        tide.vocab: true
        description: "[DEPRECATED - use surface] Technical platforms that may be concerned by the vector"
        example: Kubernetes

      severity: 
        title: Severity
        type: string
        tide.vocab: true
        description: Name of the technical environment the threat is known to have been executed on or upon.
        example: AWS

      leverage: 
        title: Leverage acquisition
        description: Adversarial acquisition of capabilities over the target system.
        type: array
        tide.vocab: true
        example: Spoofing

      impact: 
        title: Impact
        type: array
        tide.vocab: true
        description: Technical consequences of the vector
        example: IP Loss

      viability: 
        title: Vector Viability
        type: string
        tide.vocab: true
        description: Likelyhood of the vector to be successfully exploited
        example: Unproven

      description:
        title: Description of the threat
        description: Explanation of the threat, and how it is exercised in adversaries operations
        tide.template.multiline : True
        type: string
        example: Placeholder
