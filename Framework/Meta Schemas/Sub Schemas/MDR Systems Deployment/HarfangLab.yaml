# HarfangLab MDR Configuration Sub-Schema
# Supports both Sigma rules (behavioral detection) and YARA rules (memory/file scanning)
# A rule must be either Sigma OR YARA, not both
#
# Key Design: Fields are CONDITIONAL based on the logsource hierarchy:
# product (windows/linux/macos) → category (event type) → available fields
# Each field is fully documented with its description from HarfangLab documentation.

required:
  - status
  - schema
  - maturity
  - confidence
  - action

# Ensure that either sigma or yara is present, but not both
oneOf:
  - required: [sigma]
    not:
      required: [yara]
  - required: [yara]
    not:
      required: [sigma]

properties:
  schema:
    title: Schema identifier and version
    type: string
    description: Identifier of the schema at its current version 
    default: harfanglab::1.0
    pattern: ^harfanglab::[1-9].[0-9]$

  status: 
    title: Status of the use-case
    type: string
    description: Define the status according to use case development life cycle process
    tide.config.statuses: True

  contributors:
    title: Development Contributors
    type: array
    description: Individuals who supported creating, enriching or tuning the detection. 
    items:
      type: string
      format: email

  tenants: 
    title: Target Tenants
    icon: 🏢
    description: |
      Override the default organizations and deploy to selected tenants only.
    type: array
    tide.config.system.tenants: harfanglab

  flags:
    title: Flags
    icon: 🚩
    description: Flags allow to customize the rule behaviour using the modifiers framework
    type: array
    tide.config.parameter-list: systems.harfanglab.platform.flags

  maturity:
    title: Rule Maturity
    description: |
      Indicates the maturity level of the rule. Maps to HarfangLab's hl_status field.
    type: string
    enum:
      - Stable
      - Testing
      - Experimental
    markdownEnumDescriptions:
      - Rule has been validated and is production-ready
      - Rule is being tested and may produce false positives
      - Rule is experimental and should be used with caution

  confidence:
    title: Rule Confidence
    description: |
      Confidence level of the detection. Maps to HarfangLab's rule_confidence_override field.
    type: string
    enum:
      - Weak
      - Moderate
      - Strong
    markdownEnumDescriptions:
      - Low confidence - may produce many false positives
      - Medium confidence - some false positives expected
      - High confidence - minimal false positives expected

  action:
    title: Rule Action
    description: |
      The action to take when the rule triggers. Maps to HarfangLab's global_state field.
    type: string
    enum:
      - Alert
      - Alert & Block
      - Alert, Block & Quarantine
    markdownEnumDescriptions:
      - Generate an alert only
      - Generate an alert and block the threat
      - Generate an alert, block, and quarantine the affected system

  tags:
    title: Rule Tags
    description: |
      Tags associated with the rule, including MITRE ATT&CK tactics and techniques.
      Used by both Sigma and YARA rules. For YARA, tags will be serialized to 
      semicolon-separated format in the meta section.
    type: array
    items:
      type: string
      pattern: ^(attack\.[a-z_]+|attack\.t[0-9]{4}(\.[0-9]{3})?|cve\.[0-9]{4}\.[0-9]+|[a-z_\.]+)$

  #############################################################################
  # SIGMA RULE SECTION
  #############################################################################
  sigma:
    title: Sigma Rule Configuration
    description: |
      Configuration for Sigma behavioral detection rules. HarfangLab's Sigma engine
      provides detection based on log sources and event patterns.
    type: object
    required:
      - logsource
      - selections
      - condition
    
    properties:
      logsource:
        title: Log Source
        description: |
          Defines the product and category of logs this rule applies to.
          Product determines which categories are available, and category determines which fields are available.
        type: object
        required:
          - product
          - category
        properties:
          product:
            title: Product
            description: The operating system/product generating the logs
            type: string
            enum:
              - windows
              - linux
              - macos

          category:
            title: Category
            description: The event category (available options depend on selected product)
            type: string

        # Conditional categories based on product
        allOf:
          - if:
              properties:
                product:
                  const: windows
            then:
              properties:
                category:
                  enum:
                    - process_creation
                    - network_connection
                    - network_dpi
                    - network_close
                    - driver_load
                    - library_event
                    - remote_thread
                    - injected_thread
                    - raw_device_access
                    - process_access
                    - process_duplicate_handle
                    - process_tampered
                    - etwti_ntallocatevirtualmemory
                    - registry_event
                    - named_pipe_creation
                    - named_pipe_connection
                    - file_create
                    - file_read
                    - file_write
                    - file_rename
                    - file_remove
                    - file_shadowcopy
                    - file_download
                    - powershell_event
                    - url_request
                    - login_event
                    - logout_event
                    - dns_query
                    - user
                    - group
                    - amsi_scan
                    - service
                    - scheduled_task
                    - eventlog
                    - win32k_getasynckeystate
                    - win32k_registerrawinputdevices
                    - win32k_setwindowshookex

          - if:
              properties:
                product:
                  const: linux
            then:
              properties:
                category:
                  enum:
                    - process_creation
                    - process_ptrace
                    - bpf_event
                    - library_event
                    - filesystem_event
                    - network_connection
                    - network_listen
                    - network_rawsocket
                    - login_event
                    - logout_event
                    - url_request
                    - dns_query

          - if:
              properties:
                product:
                  const: macos
            then:
              properties:
                category:
                  enum:
                    - process_creation
                    - library_event
                    - filesystem_event
                    - network_connection
                    - login_event
                    - logout_event

      selections:
        title: Detection Selections
        description: |
          List of field selections for the detection rule. Each selection defines
          a set of field conditions that can be combined using the condition expression.
        type: array
        minItems: 1
        items:
          type: object
          required:
            - name
            - field
            - value
          properties:
            name:
              title: Selection Name
              description: |
                A unique name for this selection, used in the condition expression.
              type: string
              pattern: ^[A-Za-z][A-Za-z0-9_]*$

            field:
              title: Field Name
              description: |
                The field to match against. Available fields depend on selected product and category.
              type: string

            modifiers:
              title: Value Modifiers
              description: |
                Modifiers to apply to the field matching. Multiple modifiers can be chained
                to transform or change how values are matched. Modifiers alter the default
                behavior of field matching (which is case-insensitive string matching).
              type: array
              items:
                type: string
                enum:
                  - all
                  - base64
                  - base64offset
                  - cased
                  - cidr
                  - contains
                  - endswith
                  - exists
                  - expand
                  - fieldref
                  - gt
                  - gte
                  - lt
                  - lte
                  - re
                  - startswith
                  - utf16
                  - utf16le
                  - utf16be
                  - wide
                  - windash
                markdownEnumDescriptions:
                  - "**all** - All values must match (AND instead of OR)"
                  - "**base64** - Base64 encode the value before matching"
                  - "**base64offset** - Base64 encode with all 3 offset variants"
                  - "**cased** - Case-sensitive matching (default is case-insensitive)"
                  - "**cidr** - Match IP addresses using CIDR notation"
                  - "**contains** - Value contains the specified substring"
                  - "**endswith** - Value ends with the specified string"
                  - "**exists** - Check if field exists (use true/false as value)"
                  - "**expand** - Expand placeholder values from pipelines"
                  - "**fieldref** - Reference another field's value"
                  - "**gt** - Greater than (for numeric comparisons)"
                  - "**gte** - Greater than or equal to"
                  - "**lt** - Less than (for numeric comparisons)"
                  - "**lte** - Less than or equal to"
                  - "**re** - Regular expression match"
                  - "**startswith** - Value starts with the specified string"
                  - "**utf16** - UTF-16 encoding (use with base64 modifiers)"
                  - "**utf16le** - UTF-16 Little Endian encoding"
                  - "**utf16be** - UTF-16 Big Endian encoding"
                  - "**wide** - Wide string encoding, alias for utf16le"
                  - "**windash** - Windows dash variants (-, /, –, —, ―)"

            value:
              title: Match Values
              description: |
                Values to match against the field. Can be a single value or a list of values.
                Multiple values are OR'd together by default. Use the 'all' modifier to change
                this behavior to AND (all values must match).
              oneOf:
                - type: string
                - type: array
                  items:
                    type: string
                - type: boolean
                - type: integer
                - type: number

      condition:
        title: Detection Condition
        description: |
          Boolean expression combining selections. Supports AND, OR, NOT operators
          and parentheses for grouping. Use selection names defined in the selections array.
          
          Examples:
          - `FileDetection and not Exclusions`
          - `(ProcessMatch or CommandLineMatch) and not Filter`
          - `selection`
          - `1 of selection*`
        type: string
        pattern: ^[A-Za-z0-9_\s\(\)\*\|]+(\s*(and|or|not|AND|OR|NOT|of)\s*[A-Za-z0-9_\s\(\)\*\|]*)*$

      false_positives:
        title: Known False Positives
        description: List of known situations that may trigger false positives
        type: array
        items:
          type: string

    # CONDITIONAL FIELD VALIDATION based on product + category
    # Each combination exposes specific fields with full descriptions
    allOf:
      #########################################################################
      # WINDOWS PROCESS_CREATION FIELDS
      #########################################################################
      - if:
          properties:
            logsource:
              properties:
                product:
                  const: windows
                category:
                  const: process_creation
        then:
          properties:
            selections:
              items:
                properties:
                  field:
                    enum:
                      - CommandLine
                      - Company
                      - CurrentDirectory
                      - Description
                      - GrandparentImage
                      - GrandparentIntegrityLevel
                      - GrandparentCommandLine
                      - Image
                      - ImageDriveType
                      - Imphash
                      - IntegrityLevel
                      - InternalName
                      - FileVersion
                      - LegalCopyright
                      - LogonId
                      - md5
                      - OriginalFileName
                      - ParentImage
                      - ParentCommandLine
                      - ParentIntegrityLevel
                      - Product
                      - ProductVersion
                      - sha1
                      - sha256
                      - User
                      - UserSID
                      - Signed
                      - Signature
                      - SignatureStatus
                      - Ancestors
                      - StackTrace
                      - MinimalStackTrace
                      - LnkLinked
                      - LnkPath
                      - LnkDriveType
                      - IsFileObjectTransacted
                      - AuthentihashSha1
                      - AuthentihashSha256
                    markdownEnumDescriptions:
                      - "**CommandLine** - Process command line"
                      - "**Company** - Company name from the process image"
                      - "**CurrentDirectory** - Directory under which the process image was executed"
                      - "**Description** - File description from the process image"
                      - "**GrandparentImage** - Path of the grandparent process image"
                      - "**GrandparentIntegrityLevel** - Grandparent process integrity level"
                      - "**GrandparentCommandLine** - Grandparent process command line"
                      - "**Image** - Path of the process image"
                      - "**ImageDriveType** - Drive type of process image (unknown, removable, fixed, remote, disk_image, ramdisk)"
                      - "**Imphash** - Imphash of the process image"
                      - "**IntegrityLevel** - Process integrity level"
                      - "**InternalName** - Internal file name from the process image"
                      - "**FileVersion** - File version from the process image"
                      - "**LegalCopyright** - Legal copyright from the process image"
                      - "**LogonId** - Login ID of the user who created the new process"
                      - "**md5** - MD5 hash of the process image"
                      - "**OriginalFileName** - Original file name from the process image"
                      - "**ParentImage** - Path of the parent process image"
                      - "**ParentCommandLine** - Parent process command line"
                      - "**ParentIntegrityLevel** - Parent process integrity level"
                      - "**Product** - Product name from the process image"
                      - "**ProductVersion** - Product version from the process image"
                      - "**sha1** - SHA1 hash of the process image"
                      - "**sha256** - SHA256 hash of the process image"
                      - "**User** - The user that created this process"
                      - "**UserSID** - The user security identifier (SID)"
                      - "**Signed** - true if the process is signed, false otherwise (matched as string)"
                      - "**Signature** - Signer name of the process"
                      - "**SignatureStatus** - Status of the signature (Valid or empty string if not signed)"
                      - "**Ancestors** - Process ancestors images joined by | (e.g. C:\\parent.exe|C:\\grandparent.exe)"
                      - "**StackTrace** - Full stacktrace leading to the event (e.g. ntdll.dll!NtCreateFile+0x200|...)"
                      - "**MinimalStackTrace** - Simplified stacktrace (ntdll.dll|kernel32.dll|UNKNOWN|...)"
                      - "**LnkLinked** - true if process was loaded from a .lnk file (matched as string)"
                      - "**LnkPath** - Path of the Windows LNK file that started the process"
                      - "**LnkDriveType** - Drive type of the LNK file (unknown, removable, fixed, remote, disk_image, ramdisk)"
                      - "**IsFileObjectTransacted** - Whether the file object is subject to NTFS transaction"
                      - "**AuthentihashSha1** - SHA1 of the authenticode-signed data of the process image"
                      - "**AuthentihashSha256** - SHA256 of the authenticode-signed data of the process image"

      #########################################################################
      # WINDOWS NETWORK_CONNECTION FIELDS
      #########################################################################
      - if:
          properties:
            logsource:
              properties:
                product:
                  const: windows
                category:
                  const: network_connection
        then:
          properties:
            selections:
              items:
                properties:
                  field:
                    enum:
                      - DestinationPort
                      - DestinationIp
                      - DestinationNames
                      - DestinationHostname
                      - DestinationIsIpv6
                      - Image
                      - Initiated
                      - Protocol
                      - ProtocolNumber
                      - SourcePort
                      - SourceIp
                      - SourceIsIpv6
                      - User
                      - ConnectionGuid
                    markdownEnumDescriptions:
                      - "**DestinationPort** - Destination port number"
                      - "**DestinationIp** - Destination IP address"
                      - "**DestinationNames** - DNS names used to resolve the destination IP address"
                      - "**DestinationHostname** - Alias of DestinationNames"
                      - "**DestinationIsIpv6** - true if the destination IP is IPv6, false otherwise (matched as string)"
                      - "**Image** - Path of the process that initiated the network connection"
                      - "**Initiated** - Indicates if the process initiated the network connection"
                      - "**Protocol** - Protocol used for the connection (tcp/udp or empty string)"
                      - "**ProtocolNumber** - IANA protocol number (tcp=6, udp=17)"
                      - "**SourcePort** - Source port number"
                      - "**SourceIp** - Source IP address"
                      - "**SourceIsIpv6** - true if the source IP is IPv6, false otherwise (matched as string)"
                      - "**User** - User associated with the process that initiated the connection"
                      - "**ConnectionGuid** - Unique identifier for the network connection"

      #########################################################################
      # WINDOWS DRIVER_LOAD FIELDS
      #########################################################################
      - if:
          properties:
            logsource:
              properties:
                product:
                  const: windows
                category:
                  const: driver_load
        then:
          properties:
            selections:
              items:
                properties:
                  field:
                    enum:
                      - ImageLoaded
                      - Signed
                      - Signature
                      - SignatureStatus
                      - DriverMd5
                      - DriverSha1
                      - DriverSha256
                      - Company
                      - Description
                      - FileVersion
                      - InternalName
                      - LegalCopyright
                      - OriginalFileName
                      - Product
                      - ProductVersion
                      - AuthentihashSha1
                      - AuthentihashSha256
                    markdownEnumDescriptions:
                      - "**ImageLoaded** - Path of the loaded driver"
                      - "**Signed** - true if the loaded driver is signed, false otherwise (matched as string)"
                      - "**Signature** - Signer name of the loaded driver"
                      - "**SignatureStatus** - Status of the signature (Valid or empty string if not signed)"
                      - "**DriverMd5** - MD5 hash of the loaded driver"
                      - "**DriverSha1** - SHA1 hash of the loaded driver"
                      - "**DriverSha256** - SHA256 hash of the loaded driver"
                      - "**Company** - Company name from the loaded driver"
                      - "**Description** - File description from the loaded driver"
                      - "**FileVersion** - File version from the loaded driver"
                      - "**InternalName** - Internal file name from the loaded driver"
                      - "**LegalCopyright** - Legal copyright from the loaded driver"
                      - "**OriginalFileName** - Original file name from the loaded driver"
                      - "**Product** - Product name from the loaded driver"
                      - "**ProductVersion** - Product version from the loaded driver"
                      - "**AuthentihashSha1** - SHA1 of the authenticode-signed data of the loaded driver"
                      - "**AuthentihashSha256** - SHA256 of the authenticode-signed data of the loaded driver"

      #########################################################################
      # WINDOWS LIBRARY_EVENT FIELDS
      #########################################################################
      - if:
          properties:
            logsource:
              properties:
                product:
                  const: windows
                category:
                  const: library_event
        then:
          properties:
            selections:
              items:
                properties:
                  field:
                    enum:
                      - Company
                      - Description
                      - FileVersion
                      - InternalName
                      - Image
                      - ImageLoaded
                      - ImageLoadedDriveType
                      - LegalCopyright
                      - OriginalFileName
                      - Product
                      - ProductVersion
                      - Signed
                      - Signature
                      - SignatureStatus
                      - StackTrace
                      - MinimalStackTrace
                      - AppDomainID
                      - AssemblyFlags
                      - AssemblyFlagsStr
                      - FullyQualifiedAssemblyName
                      - AssemblyName
                      - AssemblyVersion
                      - AssemblyCulture
                      - AssemblyToken
                      - ModuleFlags
                      - ModuleFlagsStr
                      - ModuleILPath
                      - ModuleNativePath
                      - ManagedPdbBuildPath
                      - NativePdbBuildPath
                      - LibraryType
                      - AuthentihashSha1
                      - AuthentihashSha256
                    markdownEnumDescriptions:
                      - "**Company** - Company name from the image loaded"
                      - "**Description** - File description from the image loaded"
                      - "**FileVersion** - File version from the image loaded"
                      - "**InternalName** - Internal file name from the image loaded"
                      - "**Image** - Path of the process that loaded the image"
                      - "**ImageLoaded** - Path of the image loaded"
                      - "**ImageLoadedDriveType** - Drive type of the image loaded (unknown, removable, fixed, remote, disk_image, ramdisk)"
                      - "**LegalCopyright** - Legal copyright from the image loaded"
                      - "**OriginalFileName** - Original file name from the image loaded"
                      - "**Product** - Product name from the image loaded"
                      - "**ProductVersion** - Product version from the image loaded"
                      - "**Signed** - true if image is signed (matched as string)"
                      - "**Signature** - Signer name of the image loaded"
                      - "**SignatureStatus** - Status of the signature (Valid or empty string if not signed)"
                      - "**StackTrace** - Full stacktrace leading to the event"
                      - "**MinimalStackTrace** - Simplified stacktrace (ntdll.dll|kernel32.dll|UNKNOWN|...)"
                      - "**AppDomainID** - Identifier for the .NET application domain where assembly is loaded"
                      - "**AssemblyFlags** - Flags that describe characteristics of the assembly"
                      - "**AssemblyFlagsStr** - Assembly flags as pipe-separated string values"
                      - "**FullyQualifiedAssemblyName** - Complete name of assembly including version, culture, public key token"
                      - "**AssemblyName** - Name of the assembly"
                      - "**AssemblyVersion** - Version of the assembly"
                      - "**AssemblyCulture** - Culture of the assembly"
                      - "**AssemblyToken** - Public key token of the assembly"
                      - "**ModuleFlags** - Flags providing additional information about the module"
                      - "**ModuleFlagsStr** - Module flags as pipe-separated string values"
                      - "**ModuleILPath** - Path to the Intermediate Language file for the module"
                      - "**ModuleNativePath** - Path to the native image file for the module"
                      - "**ManagedPdbBuildPath** - Build path for the PDB of the managed code"
                      - "**NativePdbBuildPath** - Build path for the PDB of the native code"
                      - "**LibraryType** - Type of the library (Native or Managed), Windows only"
                      - "**AuthentihashSha1** - SHA1 of the authenticode-signed data of the loaded image"
                      - "**AuthentihashSha256** - SHA256 of the authenticode-signed data of the loaded image"

      #########################################################################
      # WINDOWS REMOTE_THREAD FIELDS
      #########################################################################
      - if:
          properties:
            logsource:
              properties:
                product:
                  const: windows
                category:
                  const: remote_thread
        then:
          properties:
            selections:
              items:
                properties:
                  field:
                    enum:
                      - NewThreadId
                      - SourceProcessId
                      - SourceImage
                      - StartAddress
                      - StartModule
                      - StartFunction
                      - TargetProcessId
                      - StackTrace
                      - MinimalStackTrace
                    markdownEnumDescriptions:
                      - "**NewThreadId** - ID of the new remote thread created in the target process"
                      - "**SourceProcessId** - ID of the source process that created the remote thread"
                      - "**SourceImage** - Path of the source process that created the remote thread"
                      - "**StartAddress** - New thread start address (8-digit padded hex, e.g. 0x0010006D)"
                      - "**StartModule** - Start module of the thread start address (empty string if unknown)"
                      - "**StartFunction** - Start function from image export table (empty string if not found)"
                      - "**TargetProcessId** - ID of the target process"
                      - "**StackTrace** - Full stacktrace leading to the event"
                      - "**MinimalStackTrace** - Simplified stacktrace (ntdll.dll|kernel32.dll|UNKNOWN|...)"

      #########################################################################
      # WINDOWS INJECTED_THREAD FIELDS
      #########################################################################
      - if:
          properties:
            logsource:
              properties:
                product:
                  const: windows
                category:
                  const: injected_thread
        then:
          properties:
            selections:
              items:
                properties:
                  field:
                    enum:
                      - TargetProcessId
                      - TargetImage
                      - SourceProcessId
                      - SourceImage
                      - NewThreadId
                      - StartAddress
                      - RegionBaseAddress
                      - RegionSize
                      - RegionStateHex
                      - RegionState
                      - RegionProtectionHex
                      - RegionProtection
                      - RegionTypeHex
                      - RegionType
                      - RegionAllocationBase
                      - RegionAllocationProtectionHex
                      - RegionAllocationProtection
                      - RegionAllocationSize
                      - RegionMappedFile
                      - RegionDump
                      - ThreadDump
                      - StackTrace
                      - MinimalStackTrace
                      - IsRemoteThread
                    markdownEnumDescriptions:
                      - "**TargetProcessId** - ID of the target process"
                      - "**TargetImage** - Path of the target process"
                      - "**SourceProcessId** - ID of the source process that created the injected thread"
                      - "**SourceImage** - Path of the source process that created the injected thread"
                      - "**NewThreadId** - ID of the new injected thread created in the target process"
                      - "**StartAddress** - New thread start address (8-digit padded hex, e.g. 0x0010006D)"
                      - "**RegionBaseAddress** - New thread's region base address (hex)"
                      - "**RegionSize** - New thread's region size in bytes"
                      - "**RegionStateHex** - State flags of the pages in the region in hexadecimal (e.g. 0x00003000)"
                      - "**RegionState** - State flags as string (e.g. MEM_COMMIT | MEM_RESERVE)"
                      - "**RegionProtectionHex** - Protection flags of the pages in hexadecimal (e.g. 0x00000040)"
                      - "**RegionProtection** - Protection flags as string (e.g. PAGE_EXECUTE_READWRITE)"
                      - "**RegionTypeHex** - Type flags of the pages in hexadecimal (e.g. 0x00020000)"
                      - "**RegionType** - Type flags as string (e.g. MEM_PRIVATE)"
                      - "**RegionAllocationBase** - Base address of range of pages allocated by VirtualAlloc (hex)"
                      - "**RegionAllocationProtectionHex** - Protection flags when region was initially allocated (hex)"
                      - "**RegionAllocationProtection** - Initial protection flags as string"
                      - "**RegionAllocationSize** - Total size of the allocation in bytes"
                      - "**RegionMappedFile** - DOS path of the file mapped at allocation's address (if any)"
                      - "**RegionDump** - First 128 bytes of the thread's memory region in hexadecimal"
                      - "**ThreadDump** - First 128 bytes after the thread's start address in hexadecimal"
                      - "**StackTrace** - Full stacktrace leading to the event"
                      - "**MinimalStackTrace** - Simplified stacktrace (ntdll.dll|kernel32.dll|UNKNOWN|...)"
                      - "**IsRemoteThread** - Boolean value holding whether the thread is being injected in a remote process"

      #########################################################################
      # WINDOWS RAW_DEVICE_ACCESS FIELDS
      #########################################################################
      - if:
          properties:
            logsource:
              properties:
                product:
                  const: windows
                category:
                  const: raw_device_access
        then:
          properties:
            selections:
              items:
                properties:
                  field:
                    enum:
                      - Image
                      - Device
                      - DesiredAccess
                      - DesiredAccessStr
                      - StackTrace
                      - MinimalStackTrace
                    markdownEnumDescriptions:
                      - "**Image** - Path of the process that performed the raw device access"
                      - "**Device** - Device targeted by the raw device access"
                      - "**DesiredAccess** - Access Mask asked by the calling process (integer)"
                      - "**DesiredAccessStr** - String translation of the Access Mask"
                      - "**StackTrace** - Full stacktrace leading to the event"
                      - "**MinimalStackTrace** - Simplified stacktrace (ntdll.dll|kernel32.dll|UNKNOWN|...)"

      #########################################################################
      # WINDOWS PROCESS_ACCESS FIELDS
      #########################################################################
      - if:
          properties:
            logsource:
              properties:
                product:
                  const: windows
                category:
                  const: process_access
        then:
          properties:
            selections:
              items:
                properties:
                  field:
                    enum:
                      - CallTrace
                      - StackTrace
                      - MinimalStackTrace
                      - GrantedAccess
                      - GrantedAccessStr
                      - SourceImage
                      - TargetImage
                      - TargetProcessCommandLine
                      - TargetProcessCompany
                      - TargetProcessCurrentDirectory
                      - TargetProcessDescription
                      - TargetProcessFileVersion
                      - TargetProcessGrandparentCommandLine
                      - TargetProcessGrandparentImage
                      - TargetProcessGrandparentIntegrityLevel
                      - TargetProcessImage
                      - TargetProcessImphash
                      - TargetProcessIntegrityLevel
                      - TargetProcessInternalName
                      - TargetProcessLegalCopyright
                      - TargetProcessLogonId
                      - TargetProcessMd5
                      - TargetProcessName
                      - TargetProcessOriginalFileName
                      - TargetProcessParentCommandLine
                      - TargetProcessParentImage
                      - TargetProcessParentIntegrityLevel
                      - TargetProcessPETimestamp
