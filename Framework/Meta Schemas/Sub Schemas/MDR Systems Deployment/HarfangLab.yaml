                    enumMarkdown:
                      - "**CallTrace** - Calltrace of the source thread"
                      - "**StackTrace** - Full stacktrace leading to the event"
                      - "**MinimalStackTrace** - Simplified stacktrace (ntdll.dll|kernel32.dll|UNKNOWN|...)"
                      - "**GrantedAccess** - Access flags requested for the target process"
                      - "**GrantedAccessStr** - Access flags as string (e.g. PROCESS_DUP_HANDLE|PROCESS_VM_READ|PROCESS_TERMINATE)"
                      - "**SourceImage** - Path of the source process that opened the target process"
                      - "**TargetImage** - Path of the target process"
                      - "**TargetProcessCommandLine** - Target process command line"
                      - "**TargetProcessCompany** - Target process company name"
                      - "**TargetProcessCurrentDirectory** - Target process current directory"
                      - "**TargetProcessDescription** - Target process description"
                      - "**TargetProcessFileVersion** - Target process file version from the image loaded"
                      - "**TargetProcessGrandparentCommandLine** - Target process grandparent command line"
                      - "**TargetProcessGrandparentImage** - Target process grandparent image"
                      - "**TargetProcessGrandparentIntegrityLevel** - Target process grandparent integrity level"
