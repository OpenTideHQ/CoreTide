steps:
  - template: ../templates/coretide_initialization.yml
  - checkout: Wiki
    fetchDepth: 1
    persistCredentials: true
    displayName: Checkout Tide Instance Wiki
  - script: |
      mv $(OpenTide.Wiki.RepoName) ./coretide
    displayName: Move Wiki to CoreTide
  - script: |
      ls -lah
      cd coretide
      if [ -e $(OpenTide.Wiki.RepoName)/staging_index.json ]
        then cp $(OpenTide.Wiki.RepoName)/staging_index.json ./
      fi
      ls -lah
    displayName: Extract Prod Index from Wiki for Reconcilitation
  - script: |
      cd coretide/Engines/indexing/
      python ./staging_indexer.py
    displayName: Generate Tide Index
    env: 
      GENERATE_INDEX_FILE: True
  - script: |
      cd coretide
      ls -lah
      cp staging_index.json ./$(OpenTide.Wiki.RepoName)/
    displayName: Copy Index to Wiki
  - script: |
      cd coretide/Orchestration
      python document.py
    displayName: Documentation Toolchain
  - script: |
      cd coretide
      cp -fr wiki/. ./$(OpenTide.Wiki.RepoName)/ 
    displayName: Copy Documentation in Wiki
  - script: |
      mv coretide/$(OpenTide.Wiki.RepoName) ./$(OpenTide.Wiki.RepoName)/
    displayName: Move Back Wiki Repo to resources
  - script: |
      cd $(OpenTide.Wiki.RepoName)
      ls -lR
      [[ $(git status --porcelain) ]] || { echo "No changes, exiting"; exit 0; }
      echo "Updated files, commiting"
      git rebase origin/$(OpenTide.Wiki.BranchName)
      git add -A
      git commit -m "CoreTide Staging Documentation Automation"
      git push origin HEAD:$(OpenTide.Wiki.BranchName)
    displayName: Commit documentation
