                          - Name
                          - Id
                          - Url
                          - SourceUser
                          - DestinationUser
                          - SourceIP
                          - DestinationIP
                        markdownEnumDescriptions:
                          - Name
                          - Id
                          - Url
                          - Source user
                          - Destination user
                          - Source IP
                          - Destination IP
  
  - if:
      properties:
        exclusions:
          contains:
            properties:
              target:
                const: URL
    then:
      properties:
        exclusions:
          items:
            if:
              properties:
                target:
                  const: URL
            then:
              properties:
                criteria:
                  items:
                    properties:
                      field:
                        enum:
                          - Name
                          - Url
                          - SourceUser
                          - DestinationUser
                          - SourceIP
                          - DestinationIP
                        markdownEnumDescriptions:
                          - Name
                          - Url
                          - Source user
                          - Destination user
                          - Source IP
                          - Destination IP
  
  - if:
      properties:
        exclusions:
