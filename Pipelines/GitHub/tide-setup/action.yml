name: Setup Tide Environment
description: |
  This action sets up the Tide environment by checking out the CoreTide repository,
  installing dependencies, and running the framework setup script.

runs:
  using: "composite"
  steps:
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install requirements
      shell: bash
      run: |
        pip install -r ${{ env.REQUIREMENTS_FILE }}

    - name: Configure Git
      shell: bash
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
