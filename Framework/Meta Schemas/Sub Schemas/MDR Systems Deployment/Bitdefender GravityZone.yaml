            then:
              properties:
                criteria:
                  items:
                    properties:
                      field:
                        enum:
                          - Name
                          - PublicKey
                          - SourceUser
                          - DestinationUser
                          - SourceIP
                          - DestinationIP
                        markdownEnumDescriptions:
                          - Name
                          - SSH public key
                          - Source user
                          - Destination user
                          - Source IP
                          - Destination IP
  
  - if:
      properties:
        exclusions:
          contains:
            properties:
              target:
                const: Launch Template
    then:
      properties:
        exclusions:
          items:
            if:
              properties:
                target:
                  const: Launch Template
