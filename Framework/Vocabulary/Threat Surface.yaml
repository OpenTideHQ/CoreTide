name: Threat Surface
field: surface
description: >-
  Hierarchical scoping of the technologies, systems and environments applicable
  to a threat vector. Uses scoped '::' delimited categories via stages.
  Replaces the deprecated targets, platforms and domains vocabularies.
icon: 🌐

stages:
  - id: os
    name: Operating Systems
    icon: 💻
    description: Operating systems and runtime environments providing kernel-level or container-level execution

  - id: application
    name: Applications
    icon: 📦
    description: User-facing, developer-facing and enterprise software applications

  - id: authentication
    name: Authentication & Identity
    icon: 🔐
    description: Identity providers, directory services, privileged access management and authentication protocols

  - id: cloud
    name: Cloud Services
    icon: ☁️
    description: Cloud provider service catalogue entries across AWS, Azure, GCP and others

  - id: infrastructure
    name: Infrastructure
    icon: 🏗️
    description: Physical and virtual infrastructure including networking, compute, storage, orchestration and industrial systems

  - id: security
    name: Security Tooling
    icon: 🛡️
    description: Defensive security tooling including endpoint protection, SIEM, SOAR, vulnerability management and forensics

  - id: iot
    name: IoT & Embedded
    icon: 📡
    description: Internet of Things devices, embedded systems and connected consumer or industrial devices

  - id: protocol
    name: Protocols
    icon: 🔌
    description: Network, communication and authentication protocols where the threat targets the protocol itself

