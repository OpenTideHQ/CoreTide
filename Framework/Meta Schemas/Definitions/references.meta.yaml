title: References to information sources
type:
  - object
  - array
description: Schema for new references
anyOf:
  - required:
      - public
  - required:
      - internal
properties:

  public:
    title: Publicly available resources
    description: Resources freely available on internet with no sharing constraints
    icon: 🕊️
    type: object
    tide.template.spacer: False
    patternProperties:
      "^[0-9]+$":
        example: 1
        type: string
        format: uri
    additionalProperties: False

  internal:
    title: Private references
    icon: 🏦
    description: |
      Proprietary, sensible and confidential data belonging to the owner of the OpenTide instance
      where the object was modelled on, and which cannot be shared.
    type: object
    tide.template.spacer: False
    patternProperties:
      "^[a-z]$":
          example: a
          type: string
          format: uri
    additionalProperties: False