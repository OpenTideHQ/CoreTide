name: Signal Entities
field: signal.entities
description: |
  Represents the core objects or attributes that a detection signal focuses on.
  These entities are critical for identifying, grouping, and analyzing security
  events. They align with common detection methodologies and frameworks like
  MITRE ATT&CK.
stages:
  - id: host
    name: Host Entities
    description: Host Related Entities
  - id: network
    name: Network Entities
    description: Network Related Entities
  - id: cloud
    name: Cloud Entities
    description: Cloud Related Entities

keys:
  - id: 39d5e5fa-d7d8-4617-9eb0-a31e61b78d49
    name: Account
    tide.vocab.stages:
      - host
      - cloud
    description: |
      Represents a user account entity, including local, domain, or cloud-based
      accounts.

  - id: 44156a4d-2b7b-4835-b6c3-9f329b81dbd0
    name: User
    tide.vocab.stages:
      - host
      - cloud
    description: |
      Represents an individual user, including their identity and associated
      attributes.

  - id: c7bad96d-6e37-4d8d-8373-ce5489958068
    name: Hostname
    tide.vocab.stages: host
    description: |
      Represents the name of a host or device in the network.

  - id: f25eef26-c9df-44ae-9ae2-030943600f93
    name: IP Address
    tide.vocab.stages: network
    description: |
      Represents an IPv4 or IPv6 address associated with a host or network
      connection.

  - id: f73506f3-fdf9-473c-8286-ad16ae56ddf6
    name: Process
    tide.vocab.stages: host
    description: |
      Represents a running process on a host, including its attributes like
      process ID and command line.

  - id: aca091fd-d169-49b3-8d92-3c11616b66db
    name: Command Line
    tide.vocab.stages: host 
    description: |
      Represents the command line arguments used to execute a process.

  - id: 8ba0fe1b-74fc-4417-87b0-788bc7e1b227
    name: File
    tide.vocab.stages: host
    description: |
      Represents a file on a system, including its name, path, and attributes.

  - id: c23fbfd5-0dd5-4dca-bc63-5e08a7a83c22
    name: File Hash
    tide.vocab.stages: host
    description: |
      Represents the hash of a file, used to uniquely identify its contents.

  - id: cb7e78f2-c4cd-43fb-b3ab-cb0d22c55424
    name: Registry Key/Value
    tide.vocab.stages: host
    description: |
      Represents a Windows registry key, including its path and associated
      values.

  - id: e6940ca8-54b5-4f4e-8b41-4412547c09aa
    name: Domain
    tide.vocab.stages: host
    description: |
      Represents a domain name, including those used in network communications
      or as part of URLs.

  - id: 7d112622-4a2c-434a-b80a-f3998dfb090b
    name: URL
    tide.vocab.stages: network
    description: |
      Represents a Uniform Resource Locator (URL), often used in web-based
      attacks or phishing campaigns.

  - id: 46673041-bbbb-4fd1-87fc-d89ac4c4546f
    name: Resource
    tide.vocab.stages: cloud
    description: |
      Represents a cloud-based resource, such as virtual machines, storage buckets, 
      or serverless functions. These resources are often targeted in cloud 
      environments for unauthorized access or exploitation.

  - id: d187990e-cebb-41cd-94d3-828beb75bdde
    name: Email
    tide.vocab.stages:
      - network
      - host
    description: |
      Represents an email entity, including sender, recipient, subject, and 
      message content. Emails are often used in phishing attacks or as a 
      vector for delivering malicious payloads.

  - id: 1e3976f7-ece0-4601-ba6b-be805aa27f84
    name: Geolocation
    tide.vocab.stages: host
    description: |
      Represents the geographic location of an IP address or device. Geolocation 
      data is often used to detect anomalies, such as logins from unexpected regions.

  - id: 0d80566c-88a9-4815-85d9-871ded46b88c
    name: Protocol
    tide.vocab.stages: network
    description: |
      Represents a network protocol, such as HTTP, HTTPS, FTP, or SMB. Protocols 
      are often analyzed to identify unusual or malicious activity.

  - id: 7e868645-b4f7-4901-8701-023f05c24799
    name: Network Connection
    tide.vocab.stages: network
    description: |
      Represents a network connection, including source and destination IPs, ports, 
      and protocols. This entity is critical for detecting suspicious or unauthorized 
      communication between systems.

  - id: c7598e49-6c2e-459e-a354-8c326752097c
    name: Port
    tide.vocab.stages: network
    description: |
      Represents a network port, including source and destination ports. Ports 
      are often used to detect unauthorized services or unusual traffic patterns.

  - id: d9dd557d-7438-4e4f-8e10-f021c1da2a16
    name: Device Type
    tide.vocab.stages: host
    description: |
      Represents the type of device, such as a workstation, server, mobile device, 
      or IoT device. This entity helps in identifying and categorizing assets.

  - id: 7da2b6bf-62ac-4e9e-ab5f-187b5b1407e0
    name: Session
    tide.vocab.stages: network
    description: |
      Represents a user or system session, including session IDs and associated 
      activities. Sessions are often analyzed to detect unauthorized access or 
      unusual behavior.

  - id: ca44ed3e-d363-4089-a155-50c716b8400f
    name: Certificate
    tide.vocab.stages: network
    description: |
      Represents a digital certificate, including its issuer, validity, and usage. 
      Certificates are often analyzed to detect spoofing or expired credentials.

  - id: ff069dd1-cfd0-494c-908f-3c295c5dd33f
    name: Token
    tide.vocab.stages: 
      - host
      - cloud
    description: |
      Represents an authentication or access token, such as OAuth tokens or API keys. 
      Tokens are often analyzed to detect unauthorized access or misuse.

  - id: 6ac71d2e-f8f0-4353-8a29-d1e0c2875acb
    name: Software
    tide.vocab.stages: host
    description: |
      Represents a software package, including its name, version, and installation 
      source. Software packages are often analyzed to detect unauthorized or 
      vulnerable software.

  - id: c2ed0ba9-1ff0-403e-914e-b72a5224b234
    name: DNS Query
    tide.vocab.stages: network
    description: |
      Represents a DNS query, including the requested domain and response. DNS 
      queries are often analyzed to detect malicious domains or command-and-control 
      (C2) activity.

  - id: 004ab636-1a3a-43e1-bab0-ed171f8df417
    name: Authentication
    tide.vocab.stages:
      - host
      - cloud 
    description: |
      Represents an authentication attempt, including the user, source IP, and 
      success or failure status. Authentication events are critical for detecting 
      brute force attacks or unauthorized access.

  - id: 3a13580e-2959-4729-afea-07f6fac6ba71
    name: Service
    tide.vocab.stages: host
    description: |
      Represents a system service, including its name, status, and associated 
      processes. Services are often analyzed to detect unauthorized or malicious 
      services running on a host.

  - id: 7860dfeb-7baf-4bee-b8a2-ef6fa76892aa
    name: Scheduled Task
    tide.vocab.stages: host
    description: |
      Represents a scheduled task or cron job, including its configuration and 
      execution details. Scheduled tasks are often used by attackers for persistence.

  - id: 20ab1a7b-ccba-408a-ae2f-37c130a21a24
    name: API Call
    tide.vocab.stages: 
      - network
      - cloud
    description: |
      Represents an API call, including its endpoint, parameters, and response. 
      API calls are often analyzed to detect unauthorized access or data exfiltration.

  - id: aeba3e93-c156-41a2-9b5a-85224e17fdda
    name: Permissions
    tide.vocab.stages: 
      - cloud
      - host
    description: |
      Leverages a set of allowed actions