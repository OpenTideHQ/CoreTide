                      - "**TargetProcessLogonId** - Logon ID of the user who created the target process"
                      - "**TargetProcessMd5** - Target process MD5 hash"
                      - "**TargetProcessName** - Target process name"
                      - "**TargetProcessOriginalFileName** - Target process original file name"
                      - "**TargetProcessParentCommandLine** - Parent command line of the target process"
                      - "**TargetProcessParentImage** - Parent image of the target process"
                      - "**TargetProcessParentIntegrityLevel** - Parent process integrity level of the target process"
                      - "**TargetProcessPETimestamp** - PE timestamp of the target process image"
                      - "**TargetProcessProduct** - Product name of the target process image"
                      - "**TargetProcessProductVersion** - Product version of the target process image"
                      - "**TargetProcessSha1** - Target process SHA1 hash"
                      - "**TargetProcessSha256** - Target process SHA256 hash"
                      - "**TargetProcessSignature** - Signature of the target process image"
                      - "**TargetProcessSignatureStatus** - Signature status of target process (Valid or empty string if not signed)"
                      - "**TargetProcessSigned** - Boolean indicating whether the target process is signed"

