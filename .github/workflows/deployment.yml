name: Deployment

on:
  workflow_call:
    inputs:
      deployment_plan:
        type: string
        description: "Deployment Plan"
        required: false
      coretide_path:
        type: string
        description: "Path where CoreTide needs to be cloned into"
        required: false
        default: coretide
      coretide_ref:
        type: string
        description: "Ref to clone CoreTide from"
        required: false
        default: development
      python_version:
        type: string
        description: "Python version to use"
        required: false
        default: "3.12"
      requirements_file:
        type: string
        description: "Requirements file path"
        required: false
        default: "coretide/Engines/requirements.txt"
      opentide_secrets:
        type: string
        description: "Content of the OpenTide secrets file"
        required: false

jobs:
  Deployment:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tide Instance
        uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Checkout CoreTide
        uses: actions/checkout@v4
        with:
          repository: OpenTideHQ/CoreTide
          path: ${{ inputs.coretide_path }}
          ref: refs/heads/${{ inputs.coretide_ref }}

      - name: Tide Setup
        uses: ./coretide/Pipelines/GitHub/tide-setup
        id: tide_setup
        with:
          python_version: ${{ inputs.python_version }}
          requirements_file: ${{ inputs.requirements_file }}
          opentide_secrets: ${{ inputs.opentide_secrets }}

      - uses: ./coretide/Pipelines/GitHub/deployment
        name: Deployment Routine
        id: deployment_routine
        with:
          deployment_plan: ${{ github.event_name == 'pull_request' && 'STAGING' || (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && 'PRODUCTION' || 'STAGING') }}