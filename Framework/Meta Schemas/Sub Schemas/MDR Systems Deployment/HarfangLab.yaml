  #############################################################################
  # YARA RULE SECTION
  #############################################################################
  yara:
    title: YARA Rule Configuration
    description: |
      Configuration for YARA rules for memory and file scanning.
      YARA rules provide pattern-based detection for malware and threat hunting.
    type: object
    required:
      - strings
      - condition
    properties:
      meta:
        title: YARA Meta Information
        description: Metadata for the YARA rule
        type: object
        properties:
          context:
            title: Scan Context
            description: Context in which the YARA rule should be applied
            type: string
            enum:
              - process
              - thread
              - memory
            enumMarkdown:
              - "**process** - Scan process memory and associated files"
              - "**thread** - Scan thread context and associated memory"
              - "**memory** - Scan raw memory regions"

          os:
            title: Target Operating System
            description: Operating system this YARA rule targets
            type: string
            enum:
              - Windows
              - MacOS
              - Linux
            enumMarkdown:
              - "**Windows** - Microsoft Windows systems"
              - "**MacOS** - Apple macOS systems"
              - "**Linux** - Linux systems"

      strings:
        title: YARA Strings
        description: |
          Raw YARA strings definition block. Define text strings, hex patterns, or regex.
          
          **Text strings:**
          $str1 = "malware" ascii
          $str2 = "suspicious" wide nocase
          
          **Hex patterns:**
          $hex1 = { 4D 5A 90 00 }
          $hex2 = { E8 ?? ?? ?? ?? }
          
          **Regular expressions:**
          $re1 = /[a-z]{5,10}/i
          
          **Modifiers:** ascii, wide, nocase, fullword, private, base64, xor
        type: string
        tide.template.multiline: True

      condition:
        title: YARA Condition
        description: |
          Raw YARA condition expression defining how strings should match.
          
          **Examples:**
          all of them
          any of ($str*)
          $str1 and $str2
          uint16(0) == 0x5A4D and $str1
          #str1 > 5
          filesize < 100KB and $hex1
          
          **Functions:** uint8, uint16, uint32, int8, int16, int32, filesize, entrypoint, at, in, for, of, them, any, all, none
        type: string
        tide.template.multiline: True
