name: "Framework Setup"
description: "Framework Setup"
runs:
  using: "composite"
  steps:
    - name: Run OpenTide Framework Setup
      shell: bash
      run: |
        cd coretide/Orchestration
        python generate.py

    - name: Check for Changes and Commit
      id: check_changes
      shell: bash
      run: |
        echo "Checking for changes"

        changes=$(git status --porcelain -- . ':!coretide')
        echo $changes

        if [[ -z "$changes" ]]; then
          echo "No changes, exiting"
          exit 0
        fi

        REPO_NAME=$(basename "$(git rev-parse --show-toplevel)")

        echo "REPO_NAME: $REPO_NAME"

        filtered_changes=$(echo "$changes" | grep -vE '(M|A|D) $REPO_NAME/|(M|A|D) coretide/')
        echo "Filtered changes: $filtered_changes"
        if [[ -z "$filtered_changes" ]]; then
          echo "Changes only in Local Instance or CoreTide directories, not committing"
          exit 0
        fi

        echo "Updated files, committing"
        git add -- . ':!PanTide' ':!CoreTide' ':!coretide'
        git commit -m "CoreTide Framework Automation [skip ci]"
        git push origin HEAD:${{ github.ref }}
